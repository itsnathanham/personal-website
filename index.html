      const { useState, useEffect, useRef } = React;

      const WORDS = ["Fintech", "AI", "Growth"];

      function RotWord() {
        const [i, setI] = useState(0);
        const [vis, setVis] = useState(true);
        useEffect(() => {
          let intervalId;
          const doRotation = () => {
            setVis(false);
            setTimeout(() => {
              setI((x) => (x + 1) % WORDS.length);
              setVis(true);
            }, 380);
          };
          const first = setTimeout(() => {
            doRotation();
            intervalId = setInterval(doRotation, 2400);
          }, 2600);
          return () => {
            clearTimeout(first);
            if (intervalId) clearInterval(intervalId);
          };
        }, []);
        return <span className={`rw grad ${vis ? "on" : "off"}`}>{WORDS[i]}</span>;
      }

        const el = document.getElementById(id);

      const DEFAULT_QUESTIONS = [

      function ChatBot() {
        const [messages, setMessages] = useState([]);
        const [input, setInput] = useState("");
        const [isLoading, setIsLoading] = useState(false);
        const messagesContainerRef = useRef(null);
        const prevMessageCountRef = useRef(0);

        useEffect(() => {
          const count = messages.length;
          if (count > prevMessageCountRef.current) {
            const el = messagesContainerRef.current;
            if (el) el.scrollTop = el.scrollHeight;
          }
          prevMessageCountRef.current = count;
        }, [messages.length]);

        const sendMessage = async (text) => {
          const trimmed = (text || input).trim();
          if (!trimmed || isLoading) return;
          setInput("");
          const userMsg = { role: "user", content: trimmed };
          setMessages((m) => [...m, userMsg]);
          setIsLoading(true);
          const assistantMsg = { role: "assistant", content: "" };
          setMessages((m) => [...m, assistantMsg]);

          const apiMessages = [...messages, userMsg].map((m) => ({
            role: m.role,
            content: m.content,
          }));

          try {
            const res = await fetch("/api/chat", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ messages: apiMessages }),
            });
            if (!res.ok) throw new Error(res.statusText);
            const reader = res.body.getReader();
            const decoder = new TextDecoder();
            let buffer = "";
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              buffer += decoder.decode(value, { stream: true });
              const lines = buffer.split("\n");
              buffer = lines.pop() || "";
              for (const line of lines) {
                if (line.startsWith("data: ")) {
                  try {
                    const data = JSON.parse(line.slice(6));
                    if (data.type === "text" && data.text) {
                      setMessages((m) => {
                        const next = [...m];
                        const last = next[next.length - 1];
                        if (last?.role === "assistant") {
                          next[next.length - 1] = { ...last, content: last.content + data.text };
                        }
                        return next;
                      });
                    } else if (data.type === "error") {
                      setMessages((m) => {
                        const next = [...m];
                        next[next.length - 1] = {
                          role: "assistant",
                          content: "Sorry, something went wrong. Please try again.",
                        };
                        return next;
                      });
                    }
                  } catch (_) {}
                }
              }
            }
          } catch (err) {
            setMessages((m) => {
              const next = [...m];
              next[next.length - 1] = {
                role: "assistant",
                content: "Sorry, I couldn't connect. Please check your connection and try again.",
              };
              return next;
            });
          } finally {
            setIsLoading(false);
          }
        };

        return (
          <div className="chat-box chat-box-full">
            <h2 style={{ fontSize: 22, fontWeight: 700, marginBottom: 12 }}>
              Ask me anything
            </h2>
            {messages.length === 0 ? (
              <div className="chat-default-questions">
                <div className="chat-question-chips">
                  {DEFAULT_QUESTIONS.map((q) => (
                    <button
                      key={q}
                      type="button"
                      className="chat-question-chip"
                      onClick={() => sendMessage(q)}
                      disabled={isLoading}
                    >
                      {q}
                    </button>
                  ))}
                </div>
                <p className="chat-disclaimer">AI may contain mistakes. Reach out to Nathan for full details</p>
              </div>
            ) : (
              <div className="chat-messages" ref={messagesContainerRef}>
                {messages.map((msg, i) => (
                  <div key={i} className={`chat-msg chat-msg-${msg.role}`}>
                    <div className="chat-msg-content">{msg.content || (msg.role === "assistant" && isLoading ? "..." : "")}</div>
                  </div>
                ))}
              </div>
            )}
            <div className="chat-input-wrap">
              <input
                type="text"
                className="chat-input"
                placeholder=""
                value={input}
                onChange={(e) => setInput(e.target.value)}
                onKeyDown={(e) => e.key === "Enter" && !e.shiftKey && sendMessage()}
                disabled={isLoading}
                aria-label="Chat message"
              />
              <button
                type="button"
                className="btn-g chat-send"
                onClick={() => sendMessage()}
                disabled={isLoading || !input.trim()}
                aria-label="Send message"
              >
                {isLoading ? "..." : "Send"}
              </button>
            </div>
          </div>
        );
      }

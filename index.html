      const WORDS = ["Fintech", "AI", "Growth"];

      function RotWord() {
        const [i, setI] = useState(0);
        const [vis, setVis] = useState(true);
        useEffect(() => {
          const t = setInterval(() => {
            setVis(false);
            setTimeout(() => {
              setI((x) => (x + 1) % WORDS.length);
              setVis(true);
            }, 380);
          }, 2600);
          return () => clearInterval(t);
        }, []);
        return <span className={`rw grad ${vis ? "on" : "off"}`}>{WORDS[i]}</span>;
      }

                      </h3>
                      <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
                        <span
                          className={`tag ${p.source === "LinkedIn" ? "source-li" : "source-ar"}`}
                        >
                          {p.source}
                        </span>
                        <span
                          style={{
                            fontSize: 12,
                            color: "#555570",
                            fontFamily: "'DM Sans',sans-serif",
                          }}
                        >
                          {p.date}
                        </span>
                      </div>
                    </div>
                    <p
                      style={{
                        fontSize: 13,
                        color: "#8888A0",
                        lineHeight: 1.65,
                        fontFamily: "'DM Sans',sans-serif",
                        marginBottom: 12,
                      }}
                    >
                      {p.desc}
                    </p>
                    <a href="#" className="rmore">
                      Read more →
                    </a>
                  </div>
                ))}
              </div>
            </div>
            <Footer />
          </div>
        );
      }

      function App() {
        const [activeSection, setActiveSection] = useState(
          () => (typeof window !== "undefined" && window.location.hash.slice(1)) || "home"
        );
        useEffect(() => {
          const onHash = () => setActiveSection(window.location.hash.slice(1) || "home");
          window.addEventListener("hashchange", onHash);
          return () => window.removeEventListener("hashchange", onHash);
        }, []);
        return (
          <>
            <style>{css}</style>
            <Nav activeSection={activeSection} onNavigate={setActiveSection} />
            <SinglePage />
          </>
        );
      }

      ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
  </body>
</html>

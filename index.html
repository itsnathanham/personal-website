      const { useState, useEffect } = React;

      const WORDS = ["Fintech", "AI", "Growth"];

      function RotWord() {
        const [i, setI] = useState(0);
        const [vis, setVis] = useState(true);
        useEffect(() => {
          let intervalId;
          const doRotation = () => {
            setVis(false);
            setTimeout(() => {
              setI((x) => (x + 1) % WORDS.length);
              setVis(true);
            }, 380);
          };
          const first = setTimeout(() => {
            doRotation();
            intervalId = setInterval(doRotation, 2400);
          }, 2600);
          return () => {
            clearTimeout(first);
            if (intervalId) clearInterval(intervalId);
          };
        }, []);
        return <span className={`rw grad ${vis ? "on" : "off"}`}>{WORDS[i]}</span>;
      }

      function scrollToSection(id) {
        const el = document.getElementById(id);
        if (el) {
          el.scrollIntoView({ behavior: "smooth" });
          window.history.replaceState(null, "", "#" + id);
        }
      }

      function Nav({ activeSection, onNavigate }) {

          { id: "resume", label: "Experience" },
          { id: "posts", label: "Posts" },
          { id: "contact", label: "Contact" },
        ];
        const handleClick = (id) => {
          onNavigate(id);
          scrollToSection(id);
          setMobileOpen(false);
        };
        return (
          <header style={{ position: "relative" }}>
            <nav>
              <div
                className="nlogo"
                onClick={() => handleClick("home")}
                tabIndex={0}
                role="button"
                onKeyDown={(e) => e.key === "Enter" && handleClick("home")}
                style={{ cursor: "pointer" }}
              >
                Nathan Hamilton
              </div>
              <ul className="nlinks">
                {sections.map(({ id, label }) => (
                  <li
                    key={id}
                    className={`nl ${activeSection === id ? "on" : ""}`}
                    onClick={() => handleClick(id)}
                    style={{ cursor: "pointer" }}
                  >
                    {label}
                  </li>
                ))}
              </ul>
              <button
                className="nav-toggle"
                aria-expanded={mobileOpen}
                aria-label="Toggle menu"
                onClick={() => setMobileOpen(!mobileOpen)}
              >
                <span />
                <span />
                <span />
              </button>
              <div className={`nav-dropdown ${mobileOpen ? "open" : ""}`}>
              {sections.map(({ id, label }) => (
                <div
                  key={id}
                  className={`nl ${activeSection === id ? "on" : ""}`}
                  onClick={() => handleClick(id)}
                  style={{ cursor: "pointer" }}
                >
                  {label}
                </div>
              ))}
              </div>
            </nav>
          </header>
        );
      }

        return (

            type="button"
            className={`copy-btn ${copied ? "copied" : ""}`}
            onClick={copy}
            aria-label={copied ? "Copied" : "Copy email"}

      function App() {
        const [activeSection, setActiveSection] = useState(
          () => (typeof window !== "undefined" && window.location.hash.slice(1)) || "home"
        );
        useEffect(() => {
          const onHash = () => setActiveSection(window.location.hash.slice(1) || "home");
          window.addEventListener("hashchange", onHash);
          const hash = window.location.hash.slice(1);
          if (hash) setTimeout(() => scrollToSection(hash), 0);
          return () => window.removeEventListener("hashchange", onHash);
        }, []);
        return (
          <>
            <Nav activeSection={activeSection} onNavigate={setActiveSection} />
            <SinglePage />
          </>
        );
      }

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Nathan Hamilton</title>
    <meta
      name="description"
      content="Nathan Hamilton — 0 to 1 product leader. Fintech, AI, growth."
    />
    <link rel="icon" href="assets/favicon.svg" type="image/svg+xml" />
  </head>
  <body>
    <div id="root"></div>

    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="text/babel" data-presets="react">
      const { useState, useEffect } = React;

      const css = `
@import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,400&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}
html,body{background:#0A0A0F;color:#F0F0F5;font-family:'DM Sans',sans-serif;}
.grad{background:linear-gradient(135deg,#6EE7B7,#3B82F6);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.btn-p{display:inline-flex;align-items:center;gap:8px;padding:12px 26px;border-radius:100px;background:linear-gradient(135deg,#6EE7B7,#3B82F6);color:#0A0A0F;font-family:'DM Sans',sans-serif;font-weight:600;font-size:15px;border:none;cursor:pointer;transition:opacity .2s;text-decoration:none;}
.btn-p:hover{opacity:.82;}
.btn-g{display:inline-flex;align-items:center;gap:8px;padding:11px 22px;border-radius:100px;background:transparent;color:#6EE7B7;font-family:'DM Sans',sans-serif;font-weight:500;font-size:14px;border:1px solid #2a2a3a;cursor:pointer;transition:border-color .2s;text-decoration:none;}
.btn-g:hover{border-color:#6EE7B7;}
.tag{display:inline-block;padding:3px 10px;border-radius:100px;background:#1a1a28;color:#6EE7B7;font-size:11px;font-family:'DM Sans',sans-serif;font-weight:500;}
.card{background:#111118;border:1px solid #1E1E2E;border-radius:12px;overflow:hidden;transition:background .2s;}
.card:hover{background:#16161F;}
.accent-bar{height:2px;background:linear-gradient(90deg,#6EE7B7,#3B82F6);}
nav{position:fixed;top:0;left:0;right:0;z-index:100;background:#0A0A0Fdd;backdrop-filter:blur(12px);border-bottom:1px solid #1E1E2E;padding:0 32px;height:60px;display:flex;align-items:center;justify-content:space-between;}
.nlogo{font-family:'Syne',sans-serif;font-weight:700;font-size:15px;color:#F0F0F5;cursor:pointer;letter-spacing:.02em;}
.nlinks{display:flex;gap:28px;list-style:none;}
.nl{font-family:'DM Sans',sans-serif;font-size:14px;color:#8888A0;cursor:pointer;transition:color .2s;position:relative;padding-bottom:2px;}
.nl:hover{color:#F0F0F5;}
.nl.on{color:#6EE7B7;}
.nl.on::after{content:'';position:absolute;bottom:-2px;left:0;right:0;height:1px;background:#6EE7B7;}
.page{padding-top:60px;min-height:100vh;}
.wrap{max-width:1100px;margin:0 auto;padding:72px 32px;}
.wrap-hero{padding:56px 32px;}
.wrap-sm{max-width:740px;margin:0 auto;padding:72px 32px;}
.sh{font-family:'Syne',sans-serif;font-size:26px;font-weight:700;color:#F0F0F5;margin-bottom:28px;display:flex;align-items:center;gap:10px;}
.sh::before{content:'';display:inline-block;width:6px;height:6px;border-radius:50%;background:linear-gradient(135deg,#6EE7B7,#3B82F6);flex-shrink:0;}
.chat-box{border:1px dashed #2a2a3a;border-radius:12px;padding:48px 32px;text-align:center;}
.hgrid{display:grid;grid-template-columns:1fr 240px;gap:36px;align-items:center;}
.ring{width:200px;height:200px;border-radius:50%;padding:4px;background:linear-gradient(135deg,#6EE7B7,#3B82F6);}
.ring-in{width:100%;height:100%;border-radius:50%;background:#1E1E2E;display:flex;align-items:center;justify-content:center;font-size:11px;color:#555570;text-align:center;font-family:'DM Sans',sans-serif;overflow:hidden;}
.pgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:14px;margin-bottom:28px;}
.source-li{background:#1a2744;color:#3B82F6;}
.source-ar{background:#1a2d1f;color:#6EE7B7;}
.rmore{color:#6EE7B7;font-size:14px;cursor:pointer;text-decoration:none;font-family:'DM Sans',sans-serif;}
.rmore:hover{text-decoration:underline;}
.pt{font-family:'Syne',sans-serif;font-size:clamp(36px,5vw,54px);font-weight:800;line-height:1.1;margin-bottom:18px;}
.ps{font-size:16px;color:#8888A0;line-height:1.75;font-family:'DM Sans',sans-serif;max-width:520px;margin-bottom:28px;}
.rw{display:inline-block;transition:opacity .35s ease,transform .35s ease;}
.rw.on{opacity:1;transform:translateY(0);}
.rw.off{opacity:0;transform:translateY(8px);}
.strip{background:#0D0D14;border-top:1px solid #1E1E2E;border-bottom:1px solid #1E1E2E;}
.footer-wrap{max-width:1100px;margin:0 auto;padding:20px 32px;border-top:1px solid #1E1E2E;display:flex;justify-content:space-between;align-items:center;margin-top:80px;}
.ft{font-size:12px;color:#555570;font-family:'DM Sans',sans-serif;}
.fl{font-size:12px;color:#555570;font-family:'DM Sans',sans-serif;cursor:pointer;transition:color .2s;text-decoration:none;}
.fl:hover{color:#6EE7B7;}
@media(max-width:640px){.hgrid{grid-template-columns:1fr;text-align:center;}.ring{margin:0 auto;width:180px;height:180px;}.nlinks{display:none;}.pgrid{grid-template-columns:1fr;}}
`;

      const WORDS = ["Fintech", "AI", "Growth"];

      function RotWord() {
        const [i, setI] = useState(0);
        const [vis, setVis] = useState(true);
        useEffect(() => {
          const t = setInterval(() => {
            setVis(false);
            setTimeout(() => {
              setI((x) => (x + 1) % WORDS.length);
              setVis(true);
            }, 380);
          }, 2600);
          return () => clearInterval(t);
        }, []);
        return <span className={`rw grad ${vis ? "on" : "off"}`}>{WORDS[i]}</span>;
      }

      function Nav({ page, go }) {
        return (
          <nav>
            <div className="nlogo" onClick={() => go("home")}>
              Nathan Hamilton
            </div>
            <ul className="nlinks">
              {["home", "building", "posts"].map((p) => (
                <li
                  key={p}
                  className={`nl ${page === p ? "on" : ""}`}
                  onClick={() => go(p)}
                >
                  {p[0].toUpperCase() + p.slice(1)}
                </li>
              ))}
            </ul>
          </nav>
        );
      }

      function Footer() {
        return (
          <div className="footer-wrap">
            <span className="ft">© 2026 Nathan Hamilton</span>
            <div style={{ display: "flex", gap: 20 }}>
              <a
                className="fl"
                href="https://www.linkedin.com/in/nathan-hamilton-8492456/"
                target="_blank"
                rel="noreferrer"
              >
                LinkedIn ↗
              </a>
              <a
                className="fl"
                href="https://github.com/itsnathanham"
                target="_blank"
                rel="noreferrer"
              >
                GitHub ↗
              </a>
            </div>
          </div>
        );
      }

      function Home({ go }) {
        return (
          <div className="page">
            <div className="wrap wrap-hero">
              <div className="hgrid">
                <div>
                  <h1
                    style={{
                      fontFamily: "'Syne',sans-serif",
                      fontWeight: 800,
                      fontSize: "clamp(34px,4.5vw,54px)",
                      lineHeight: 1.08,
                      marginBottom: 18,
                    }}
                  >
                    <span className="grad">0 to 1 </span>
                    <RotWord />
                    <br />
                    <span className="grad">Product Leader</span>
                  </h1>
                  <p
                    style={{
                      fontSize: 16,
                      color: "#8888A0",
                      lineHeight: 1.8,
                      maxWidth: 680,
                      marginBottom: 22,
                      fontFamily: "'DM Sans',sans-serif",
                    }}
                  >
                    Senior product leader with founder range. Created a 0 to 1
                    consumer finance marketplace product that scaled to $100M+
                    revenue, leading the product vision and earned growth P&L.
                    Acquired a struggling investing SaaS as a founder, executing
                    a product-led turnaround to improve customer trust,
                    activation, retention, and monetization (119% LTV increase,
                    11% to 5% churn, 28% to 73% trial conversion) in under a
                    year. Equally comfortable with 0 to 1 vision, 1→100 scale, and
                    the full-stack product work in between.
                  </p>
                  <a href="#chatbot" className="btn-p">
                    Get to know me with AI ✦
                  </a>
                </div>
                <div style={{ display: "flex", justifyContent: "center" }}>
                  <div className="ring" aria-hidden="true">
                    <div className="ring-in">
                      <img
                        src="assets/profile.png"
                        alt="Nathan Hamilton"
                        style={{ width: "100%", height: "100%", objectFit: "cover" }}
                      />
                    </div>
                  </div>
                </div>
              </div>
            </div>

            <div className="strip">
              <div className="wrap">
                <h2 className="sh">Currently Building</h2>
                <div className="pgrid">
                  {[
                    {
                      title: "Dividend Watch",
                      desc: "B2C investing analytics SaaS — portfolio tracking, dividend forecasting, and alerts for 39,000 active users.",
                      tags: [
                        "Cursor",
                        "Claude",
                        "Figma",
                        "39K Users",
                        "Product-led growth",
                      ],
                    },
                    {
                      title: "Chore Tracker App",
                      desc: "A household chore tracking app built as a personal project — full product lifecycle from concept to launch.",
                      tags: ["Cursor", "Claude", "Figma", "Personal Project"],
                    },
                    {
                      title: "Golf Analytics App",
                      desc: "Tracking rounds, handicap trends, and performance insights — built with AI-assisted workflows.",
                      tags: ["Cursor", "Claude", "Figma", "Personal Project"],
                    },
                    {
                      title: "Job Search Agent",
                      desc: "An AI agent that helps run a job search — researching roles, tracking leads, and automating outreach workflows.",
                      tags: ["Zapier Agent", "Sonnet 4.6", "Airtable"],
                    },
                    {
                      title: "This Website",
                      desc: "A fast, clean personal website built and iterated with AI-assisted workflows.",
                      tags: ["Claude Code", "Cursor"],
                    },
                  ].map((p) => (
                    <div className="card" key={p.title} style={{ padding: 0 }}>
                      <div className="accent-bar" />
                      <div style={{ padding: "18px 22px 22px" }}>
                        <h3
                          style={{
                            fontFamily: "'Syne',sans-serif",
                            fontWeight: 700,
                            fontSize: 16,
                            marginBottom: 8,
                            color: "#F0F0F5",
                          }}
                        >
                          {p.title}
                        </h3>
                        <p
                          style={{
                            fontSize: 13,
                            color: "#8888A0",
                            lineHeight: 1.65,
                            marginBottom: 14,
                            fontFamily: "'DM Sans',sans-serif",
                          }}
                        >
                          {p.desc}
                        </p>
                        <div style={{ display: "flex", gap: 5, flexWrap: "wrap" }}>
                          {p.tags.map((t) => (
                            <span key={t} className="tag">
                              {t}
                            </span>
                          ))}
                        </div>
                      </div>
                    </div>
                  ))}
                </div>
                <button className="btn-g" onClick={() => go("building")}>
                  → Learn more about what I'm building
                </button>
              </div>
            </div>

            <div className="wrap-sm" id="chatbot">
              <div className="chat-box">
                <h2
                  style={{
                    fontFamily: "'Syne',sans-serif",
                    fontSize: 22,
                    fontWeight: 700,
                    marginBottom: 12,
                  }}
                  className="grad"
                >
                  Ask me anything
                </h2>
                <p
                  style={{
                    fontSize: 14,
                    color: "#8888A0",
                    lineHeight: 1.7,
                    maxWidth: 400,
                    margin: "0 auto 22px",
                    fontFamily: "'DM Sans',sans-serif",
                  }}
                >
                  An AI version of me is coming here soon — powered by my work
                  history, writing, and experience. Until then, reach out
                  directly.
                </p>
                {/* TODO: Replace with Zapier chatbot embed */}
                <a href="#" className="btn-g">
                  → Connect on LinkedIn
                </a>
              </div>
            </div>

            <Footer />
          </div>
        );
      }

      function Building() {
        const projects = [
          {
            title: "Dividend Watch",
            sub: "B2C Investing Analytics SaaS",
            tags: ["Cursor", "Claude", "Figma", "39K Users", "Product-led growth"],
            body: "Dividend Watch is an investing analytics platform I acquired and turned around after it was struggling. I rebuilt the product strategy, redesigned core features, and built out the growth systems. The result: 43% ARR growth, churn reduced from 11% to 5%, and trial-to-paid conversion improved from 28% to 73%. It now serves 39,000 users.",
            link: "Visit Dividend Watch →",
          },
          {
            title: "Chore Tracker App",
            sub: "Personal Project — Household Management App",
            tags: ["Cursor", "Claude", "Figma", "Personal Project"],
            body: "A full-stack personal project built to scratch my own itch — a simple, clean app for tracking household chores across multiple people. Built end-to-end using Cursor and Claude for engineering, Figma for design. An exercise in shipping real product fast with modern AI-assisted workflows.",
            link: "View on GitHub →",
          },
          {
            title: "Golf Analytics App",
            sub: "Personal Project — Performance Tracking for Golfers",
            tags: ["Cursor", "Claude", "Figma", "Personal Project"],
            body: "A personal project that tracks rounds, visualizes handicap trends, and surfaces patterns in my game. Built as a real product — not just a side script — with a proper UI and data model. Another experiment in AI-assisted product building, and genuinely useful for any serious golfer.",
            link: "View on GitHub →",
          },
          {
            title: "Job Search Agent",
            sub: "Automation + Research Agent",
            tags: ["Zapier Agent", "Sonnet 4.6", "Airtable"],
            body: "A job-search copilot that helps identify roles, keep an Airtable pipeline up to date, and automate repeatable workflows across applications and outreach.",
            link: "See details →",
          },
          {
            title: "This Website",
            sub: "Personal Site",
            tags: ["Claude Code", "Cursor"],
            body: "This site, built with a focus on clean design, speed, and rapid iteration using modern AI-assisted tooling.",
            link: "View source →",
          },
        ];
        return (
          <div className="page">
            <div className="wrap">
              <h1 className="pt grad">What I'm Building</h1>
              <p className="ps">
                A mix of professional work and personal projects — all built
                with real product thinking.
              </p>
              <div style={{ display: "flex", flexDirection: "column", gap: 16 }}>
                {projects.map((p) => (
                  <div className="card" key={p.title} style={{ padding: 0 }}>
                    <div className="accent-bar" />
                    <div style={{ padding: "26px 30px 30px" }}>
                      <div
                        style={{
                          display: "flex",
                          justifyContent: "space-between",
                          alignItems: "flex-start",
                          flexWrap: "wrap",
                          gap: 12,
                          marginBottom: 12,
                        }}
                      >
                        <div>
                          <h3
                            style={{
                              fontFamily: "'Syne',sans-serif",
                              fontWeight: 700,
                              fontSize: 19,
                              color: "#F0F0F5",
                              marginBottom: 4,
                            }}
                          >
                            {p.title}
                          </h3>
                          <p
                            style={{
                              fontSize: 12,
                              color: "#555570",
                              fontFamily: "'DM Sans',sans-serif",
                            }}
                          >
                            {p.sub}
                          </p>
                        </div>
                        <div style={{ display: "flex", gap: 5, flexWrap: "wrap" }}>
                          {p.tags.map((t) => (
                            <span key={t} className="tag">
                              {t}
                            </span>
                          ))}
                        </div>
                      </div>
                      <p
                        style={{
                          fontSize: 14,
                          color: "#8888A0",
                          lineHeight: 1.75,
                          fontFamily: "'DM Sans',sans-serif",
                          marginBottom: 18,
                          maxWidth: 640,
                        }}
                      >
                        {p.body}
                      </p>
                      <a href="#" className="rmore">
                        {p.link}
                      </a>
                    </div>
                  </div>
                ))}
              </div>
            </div>
            <Footer />
          </div>
        );
      }

      function Posts() {
        const posts = [
          {
            title: "What I Learned Scaling a Fintech Product Line to $100M",
            source: "LinkedIn",
            date: "January 2025",
            desc: "Placeholder — Add your LinkedIn post summary here. Describe the key insight or story from the post in 2–3 sentences.",
          },
          {
            title: "How I Turned Around a Struggling SaaS in 18 Months",
            source: "Article",
            date: "November 2024",
            desc: "Placeholder — Add article summary here. Cover the core narrative and what readers take away from the piece.",
          },
          {
            title: "Building with AI: What Product Managers Need to Know",
            source: "LinkedIn",
            date: "September 2024",
            desc: "Placeholder — Add your LinkedIn post summary here. Share the key perspective or framework from this post.",
          },
          {
            title: "Why Churn Is a Product Problem, Not a Marketing One",
            source: "Article",
            date: "July 2024",
            desc: "Placeholder — Add article summary here. Outline the main argument and what makes this perspective unique.",
          },
        ];
        return (
          <div className="page">
            <div className="wrap">
              <h1 className="pt grad">Writing & Thinking</h1>
              <p className="ps">Notes on product, fintech, growth, and building.</p>
              <div style={{ marginBottom: 36 }}>
                <a href="#" className="btn-g">
                  View my GitHub →
                </a>
              </div>
              <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
                {posts.map((p) => (
                  <div className="card" key={p.title} style={{ padding: "22px 26px" }}>
                    <div
                      style={{
                        display: "flex",
                        justifyContent: "space-between",
                        alignItems: "flex-start",
                        flexWrap: "wrap",
                        gap: 8,
                        marginBottom: 10,
                      }}
                    >
                      <h3
                        style={{
                          fontFamily: "'Syne',sans-serif",
                          fontWeight: 600,
                          fontSize: 16,
                          color: "#F0F0F5",
                          maxWidth: 520,
                        }}
                      >
                        {p.title}
                      </h3>
                      <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
                        <span
                          className={`tag ${p.source === "LinkedIn" ? "source-li" : "source-ar"}`}
                        >
                          {p.source}
                        </span>
                        <span
                          style={{
                            fontSize: 12,
                            color: "#555570",
                            fontFamily: "'DM Sans',sans-serif",
                          }}
                        >
                          {p.date}
                        </span>
                      </div>
                    </div>
                    <p
                      style={{
                        fontSize: 13,
                        color: "#8888A0",
                        lineHeight: 1.65,
                        fontFamily: "'DM Sans',sans-serif",
                        marginBottom: 12,
                      }}
                    >
                      {p.desc}
                    </p>
                    <a href="#" className="rmore">
                      Read more →
                    </a>
                  </div>
                ))}
              </div>
            </div>
            <Footer />
          </div>
        );
      }

      function App() {
        const [page, setPage] = useState("home");
        return (
          <>
            <style>{css}</style>
            <Nav page={page} go={setPage} />
            {page === "home" && <Home go={setPage} />}
            {page === "building" && <Building />}
            {page === "posts" && <Posts />}
          </>
        );
      }

      ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
  </body>
</html>
